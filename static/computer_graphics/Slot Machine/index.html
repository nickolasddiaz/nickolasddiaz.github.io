    class Main {
        money;
        slotMachines;
        status_elem;
        money_elem;
        parent_element;
        constructor(status_elem, money_elem, table_element, slot_machines) {
            this.money = 100;
            this.slotMachines = [];
            for (let i = 0; i < slot_machines; i++) {
                this.slotMachines[i] = new SlotMachine(table_element);
            }
            this.status_elem = status_elem;
            this.money_elem = money_elem;
            this.parent_element = table_element;
        }
        set _money(money) {
            this.money = money;
            this.money_elem.innerHTML = `$${money.toString()}`;
        }
        PlayAll() {
            if (this.money <= 0) {
                this.status_elem.innerHTML = "No money";
                return;
            }
            this._money = this.money - 1;
            let sum = 0;
            for (let slot of this.slotMachines.slice()) {
                sum += slot.play();
            }
            if (sum > 0) {
                this.status_elem.innerHTML = `Winner: Money made: ${sum}`;
                this._money = this.money + sum;
            }
            else {
                this.status_elem.innerHTML = `Game Over`;
            }
        }
        reset(slot_machines) {
            const rows = this.parent_element.querySelectorAll('tr:not(:first-child)');
            rows.forEach(row => row.remove());
            this.slotMachines = [];
            for (let i = 0; i < slot_machines; i++) {
                this.slotMachines[i] = new SlotMachine(this.parent_element);
            }
            this.status_elem.innerHTML = "";
        }
    }
    class SlotMachine {
        last_amount_won;
        numbers;
        image_element;
        constructor(parent_element) {
            this.last_amount_won = 0;
            this.numbers = [0, 0, 0];
            this.image_element = [new Image(), new Image(), new Image()];
            let tr_element = document.createElement('tr');
            for (let elm of this.image_element) {
                let td_element = document.createElement('td');
                elm.src = IMAGES[0];
                elm.alt = '0';
                td_element.appendChild(elm);
                tr_element.appendChild(td_element);
            }
            parent_element.appendChild(tr_element);
        }
        play() {
            for (let i in this.numbers) {
                this.numbers[i] = Math.floor(Math.random() * (IMAGE_NUMBERS + 1));
                if (this.image_element[i] !== undefined) {
                    this.image_element[i].src = IMAGES[this.numbers[i]];
                    this.image_element[i].alt = String(this.numbers[i]);
                }
            }
            if (this.numbers[0] === this.numbers[1]) {
                if (this.numbers[0] === this.numbers[2]) {
                    return this.numbers[0] === 0 ? 14 : 7;
                }
                else {
                    return this.numbers[0] === 0 ? 3 : 2;
                }
            }
            return this.numbers[0] === 0 ? 1 : 0;
        }
    }


    const gameTable = document.getElementById('gameTable');
    const money_elem = document.getElementById('money_elem');
    const status_elem = document.getElementById('status_elem');
    const machineSlider = document.getElementById('machines');
    const play_button = document.getElementById('play_button');

    let main = new Main(status_elem, money_elem, gameTable, machineSlider.value);

    play_button.onclick = main.PlayAll.bind(main);

    machineSlider.oninput = function() {
        const count = parseInt(this.value);
        play_button.innerHTML = `Play ${count}`;

        main.reset(count);
    };
</script>
